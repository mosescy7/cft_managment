name: Build site

on:
  push:
    branches: [main]
    paths:
      - 'build.py'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run build.py
        run: python build.py

      - name: Commit and push regenerated HTML if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -- '*.html'
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto-build: regenerate HTML from build.py"
            git push
          fi